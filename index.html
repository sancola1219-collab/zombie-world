<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>殭屍世界：黑鴉市事件</title>
<link rel="stylesheet" href="./css/style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div id="crosshair"></div>
  <div id="hitmarker">✕</div>
  <div id="hint"></div>
  <div id="ammo"></div>
  <canvas id="ecg" width="200" height="64"></canvas>
</div>
<div id="vignette"></div>
<div id="inv" class="overlay" style="display:none">
  <div class="panel inv-panel">
    <h2>物品欄</h2>
    <div id="inv-grid"></div>
    <div id="inv-desc"></div>
    <p class="tip">WASD/方向鍵 移動．E 使用．F 選取＋組合．G 丟棄．Tab 關閉</p>
  </div>
</div>
<div id="typewriter" class="overlay" style="display:none">
  <div class="panel">
    <h2>打字機</h2>
    <p id="tw-info"></p>
    <p class="tip">E 存檔．R 讀取．Tab 離開</p>
  </div>
</div>
<div id="death" class="overlay" style="display:none">
  <div class="panel">
    <h1 class="death-title">你死了</h1>
    <p class="tip" id="death-tip">R 讀取存檔．Enter 重新開始</p>
  </div>
</div>
<div id="loading" class="overlay">
  <div class="panel">
    <h1>殭屍世界</h1>
    <p>黑鴉市事件</p>
    <p class="tip">載入中…</p>
  </div>
</div>
<div id="pause" class="overlay" style="display:none">
  <div class="panel">
    <h1>暫停</h1>
    <button id="resume">繼續遊戲</button>
    <p class="tip" id="pause-tip">點擊畫面鎖定視角．WASD 移動．Shift 奔跑．E 互動．Esc 暫停</p>
  </div>
</div>
<div id="error" class="overlay" style="display:none">
  <div class="panel">
    <h1>無法啟動</h1>
    <p>你的瀏覽器不支援 WebGL，無法執行本遊戲。</p>
  </div>
</div>
<script type="module" src="./js/main.js" id="zw-entry"></script>
<script>
// 載入看門狗（傳統 script，舊瀏覽器也會執行）：
// module 匯入鏈（含 three CDN）任一環節失敗時 boot() 不會跑，
// 若無此段玩家只會看到永遠的「載入中…」。
(function () {
  function fail(msg) {
    var loading = document.getElementById('loading');
    if (window.__zw || !loading || loading.style.display === 'none') return;
    loading.querySelector('.tip').textContent = msg;
  }
  document.getElementById('zw-entry').addEventListener('error', function () {
    fail('載入失敗：無法取得遊戲資源，請檢查網路後重新整理');
  });
  window.addEventListener('unhandledrejection', function () {
    fail('載入失敗：請重新整理頁面');
  });
  setTimeout(function () {
    fail('載入逾時：請檢查網路，或更新瀏覽器（需支援 import map，如 Safari 16.4+、近代 Chrome/Edge/Firefox）後重試');
  }, 15000);
})();
</script>
</body>
</html>
